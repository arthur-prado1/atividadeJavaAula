<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de controle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <a class="navbar-brand" href="/dashboard">FATEC - Catalogo</a>
        <div class="navbar-actions">
            <span class="navbar-user" th:text="'Ola, ' + ${#authentication.name}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>Painel de controle</h2>
            <span class="role-badge" sec:authorize="hasRole('USER')">Aluno</span>
            <span class="role-badge role-badge-admin" sec:authorize="hasRole('ADMIN')">Professor</span>
        </div>

        <div class="card-body dashboard-body">
            <div class="dashboard-grid">
                <a class="dashboard-action" href="/produtos">
                    <span class="dashboard-title">Produtos</span>
                    <span class="dashboard-text">Visualizar catalogo de produtos.</span>
                </a>

                <a class="dashboard-action" href="/categorias">
                    <span class="dashboard-title">Categorias</span>
                    <span class="dashboard-text">Visualizar categorias cadastradas.</span>
                </a>

                <a class="dashboard-action dashboard-admin" href="/produtos/novo" sec:authorize="hasRole('ADMIN')">
                    <span class="dashboard-title">Novo produto</span>
                    <span class="dashboard-text">Cadastrar produto no catalogo.</span>
                </a>

                <a class="dashboard-action dashboard-admin" href="/categorias" sec:authorize="hasRole('ADMIN')">
                    <span class="dashboard-title">Gerenciar categorias</span>
                    <span class="dashboard-text">Criar, editar e excluir categorias.</span>
                </a>

                <a class="dashboard-action dashboard-admin" href="/usuarios" sec:authorize="hasRole('ADMIN')">
                    <span class="dashboard-title">Usuarios</span>
                    <span class="dashboard-text">Gerenciar acessos do sistema.</span>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
