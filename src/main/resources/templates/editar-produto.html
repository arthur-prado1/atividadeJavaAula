<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <a class="navbar-brand" href="/dashboard">FATEC - Catalogo</a>
        <div class="navbar-actions">
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Painel</a>
            <a href="/produtos" class="btn btn-outline-light btn-sm">Produtos</a>
            <span class="navbar-user" th:text="'Ola, ' + ${#authentication.name}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card mx-auto">
        <div class="card-header">
            <h2>Editar Produto</h2>
        </div>
        <div class="card-body" style="padding: 24px !important;">
            <form th:action="@{/produtos/editar/{id}(id=${produto.idProduto})}"
                  th:object="${produto}"
                  method="post"
                  novalidate>
                <div class="mb-3">
                    <label class="form-label">Nome do produto</label>
                    <input type="text"
                           th:field="*{nome}"
                           th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
                           class="form-control"
                           placeholder="Ex: Notebook Dell">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoria</label>
                    <select th:field="*{categoria.id}"
                            th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid' : ''"
                            class="form-select">
                        <option value="">Selecione uma categoria</option>
                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nome}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Preco (R$)</label>
                    <input type="number"
                           step="0.01"
                           th:field="*{valor}"
                           th:classappend="${#fields.hasErrors('valor')} ? 'is-invalid' : ''"
                           class="form-control"
                           placeholder="0,00">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Salvar alteracoes</button>
                    <a href="/produtos" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
