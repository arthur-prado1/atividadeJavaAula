<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <a class="navbar-brand" href="/produtos">FATEC — Catálogo</a>
        <div class="navbar-actions">
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Painel</a>
            <a href="/usuarios" class="btn btn-outline-light btn-sm">Usuarios</a>
            <span class="navbar-user" th:text="'Ola, ' + ${#authentication.name}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card mx-auto">
        <div class="card-header">
            <h2>Editar Usuário</h2>
        </div>
        <div class="card-body" style="padding: 24px !important;">

            <div th:if="${erro}" class="alert-erro">
                ⚠ <span th:text="${erro}"></span>
            </div>

            <form th:action="@{/usuarios/editar/{id}(id=${usuario.idUsuario})}"
                  th:object="${usuario}"
                  method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" th:field="*{password}" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label">Perfil</label>
                    <select th:field="*{role}" class="form-select">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Salvar alterações</button>
                    <a href="/usuarios" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
