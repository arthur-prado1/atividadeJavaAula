<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <a class="navbar-brand" href="/dashboard">FATEC - Catalogo</a>
        <div class="navbar-actions">
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Painel</a>
            <a href="/produtos" class="btn btn-outline-light btn-sm">Produtos</a>
            <a href="/usuarios" class="btn btn-outline-light btn-sm" sec:authorize="hasRole('ADMIN')">Usuarios</a>
            <span class="navbar-user" th:text="'Ola, ' + ${#authentication.name}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>Categorias</h2>
        </div>

        <div class="card-body">
            <div th:if="${erro}" class="alert-erro">
                <span th:text="${erro}"></span>
            </div>

            <div sec:authorize="hasRole('ADMIN')" style="padding: 20px 24px; border-bottom: 1px solid var(--border-2);">
                <form th:action="${editando} ? @{/categorias/editar/{id}(id=${categoria.id})} : @{/categorias}"
                      th:object="${categoria}"
                      method="post"
                      novalidate>
                    <div class="row g-2 align-items-start">
                        <div class="col-12 col-md">
                            <label for="nome" class="form-label" th:text="${editando} ? 'Editar categoria' : 'Nova categoria'"></label>
                            <input id="nome"
                                   type="text"
                                   th:field="*{nome}"
                                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
                                   class="form-control"
                                   placeholder="Ex: Eletronicos">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                        </div>
                        <div class="col-12 col-md-auto" style="padding-top: 24px;">
                            <button type="submit" class="btn btn-success" th:text="${editando} ? 'Salvar categoria' : 'Criar categoria'"></button>
                            <a th:if="${editando}" href="/categorias" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th style="padding-left:24px;">ID</th>
                        <th>Nome</th>
                        <th sec:authorize="hasRole('ADMIN')">Acoes</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td th:colspan="${#authorization.expression('hasRole(''ADMIN'')') ? 3 : 2}" style="border:none;">
                            <div class="empty-state">
                                <div style="font-size:32px;">Categorias</div>
                                <p>Nenhuma categoria cadastrada ainda.</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="c : ${categorias}">
                        <td data-label="ID" style="padding-left:24px;" th:text="${c.id}"></td>
                        <td data-label="Nome">
                            <span class="product-name" th:text="${c.nome}"></span>
                        </td>
                        <td data-label="Acoes" sec:authorize="hasRole('ADMIN')">
                            <div class="action-group">
                                <a th:href="@{/categorias/editar/{id}(id=${c.id})}"
                                   class="btn btn-warning btn-sm">Editar</a>
                                <a th:href="@{/categorias/excluir/{id}(id=${c.id})}"
                                   class="btn btn-danger btn-sm">Excluir</a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
