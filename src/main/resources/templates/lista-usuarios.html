<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <a class="navbar-brand" href="/dashboard">FATEC — Catálogo</a>
        <div class="navbar-actions">
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Painel</a>
            <a href="/produtos" class="btn btn-outline-light btn-sm">Produtos</a>
            <a href="/categorias" class="btn btn-outline-light btn-sm">Categorias</a>
            <span class="navbar-user" th:text="'Ola, ' + ${#authentication.name}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Usuários</h2>
            <div sec:authorize="hasRole('ADMIN')">
                <a href="/usuarios/novo" class="btn btn-success btn-sm">+ Novo</a>
            </div>
        </div>
        <div class="card-body">

            <div th:if="${erro}" class="alert alert-danger">
                <span th:text="${erro}"></span>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th style="padding-left:24px;">Username</th>
                        <th>Perfil</th>
                        <th sec:authorize="hasRole('ADMIN')">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td th:colspan="${#authorization.expression('hasRole(''ADMIN'')') ? 3 : 2}"
                            style="border:none;">
                            <div class="empty-state">
                                <div style="font-size:32px;">👤</div>
                                <p>Nenhum usuário cadastrado ainda.</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="u : ${usuarios}">
                        <td style="padding-left:24px;" th:text="${u.username}"></td>
                        <td th:text="${u.role}"></td>
                        <td sec:authorize="hasRole('ADMIN')">
                            <div class="action-group">
                                <a th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}"
                                   class="btn btn-warning btn-sm">✏ Editar</a>
                                <a th:href="@{/usuarios/excluir/{id}(id=${u.idUsuario})}"
                                   class="btn btn-danger btn-sm">🗑 Excluir</a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
